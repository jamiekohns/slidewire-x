name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4', '8.5']
        laravel-version: ['12', '13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set Laravel test matrix
        run: |
          if [ "${{ matrix.laravel-version }}" = "12" ]; then
            composer require --dev laravel/framework:^12.0 orchestra/testbench:^10.9 --no-update --no-interaction
          else
            composer require --dev laravel/framework:^13.0@dev orchestra/testbench:^11.0@dev --no-update --no-interaction
          fi

      - name: Install Dependencies
        run: composer update --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Playwright package
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Tests
        run: composer test

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Playwright package
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Browser Tests
        run: composer test:browser:ci
